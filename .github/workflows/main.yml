name: Deploy VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 191.252.205.40
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            /var/www/deploy.sh
